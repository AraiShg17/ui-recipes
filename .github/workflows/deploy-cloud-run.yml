name: deploy to cloud run

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: protfolio-as
  REGION: asia-northeast1
  SERVICE_NAME: ui-recipes
  REPOSITORY_NAME: cloud-run-apps

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: auth (workload identity federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      - name: setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: configure docker for artifact registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: build & push image
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY_NAME}/${SERVICE_NAME}:${IMAGE_TAG}"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: deploy to cloud run
        run: |
          set -euo pipefail
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE_URI" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated

      - name: show service url
        run: |
          set -euo pipefail
          URL="$(gcloud run services describe "$SERVICE_NAME" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          echo "Service URL: $URL"
